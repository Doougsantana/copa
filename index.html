h2 {

.jogo {

.topo {

.acoes {

.acoes {

const container = document.getElementById("jogos");

let rodadaAtual = 0;

jogos.forEach((jogo, i) => {
    if (jogo.rodada !== rodadaAtual) {
        rodadaAtual = jogo.rodada;
        container.innerHTML += `<h2>${rodadaAtual}ª Rodada</h2>`;
    }

    container.innerHTML += `
    <div class="jogo">
        <div class="info-jogo">
            <div><b>${jogo.grupo}</b></div>
            <div>${jogo.data}</div>
            <div>${jogo.cidade}</div>
            <div>${jogo.horario}</div>
        </div>

        <div class="linha-placar">
            <span class="time">${jogo.t1}</span>
            <input type="number" class="placar-input" id="g1_${i}" min="0" placeholder="0">
            <span>x</span>
            <input type="number" class="placar-input" id="g2_${i}" min="0" placeholder="0">
            <span class="time">${jogo.t2}</span>
        </div>
    </div>
    `;
});

function msg(texto, tipo){
    const m = document.getElementById("mensagem");
    m.style.display = "block";
    m.className = "msg " + tipo;
    m.innerText = texto;
}

function salvar(){
    const nome = document.getElementById("nome").value.trim();
    const telefone = document.getElementById("telefone").value.trim();
    const apelido = document.getElementById("apelido").value.trim();
    const data = document.getElementById("data").value;

    if(!nome || !telefone || !apelido || !data){
        msg("Preencha todos os campos!", "erro");
        return;
    }

    let palpites = [];

    for(let i = 0; i < jogos.length; i++){
        let g1 = document.getElementById(`g1_${i}`).value;
        let g2 = document.getElementById(`g2_${i}`).value;

        if(g1 === "" || g2 === ""){
            msg("Preencha todos os jogos!", "erro");
            return;
        }

        palpites.push({
            jogo: i + 1,
            rodada: jogos[i].rodada,
            grupo: jogos[i].grupo,
            data_jogo: jogos[i].data,
            cidade: jogos[i].cidade,
            horario: jogos[i].horario,
            t1: jogos[i].t1,
            t2: jogos[i].t2,
            g1,
            g2
        });
    }

    const dados = {
        nome,
        apelido,
        telefone,
        data,
        palpites
    };

    emailjs.init("02aiblnVh9jdGpFfi");

    emailjs.send("service_3wpi22h", "template_ttbfgni", {
        mensagem: JSON.stringify(dados, null, 2),
        nome: nome
    })
    .then(() => {
        msg("Palpites enviados com sucesso!", "sucesso");
    })
    .catch(() => {
        msg("Erro ao enviar!", "erro");
    });
}
</script>
